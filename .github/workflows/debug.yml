name: Debug
on:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install requests
      - env:
          EDINET_API_KEY: ${{ secrets.EDINET_API_KEY }}
        run: python scripts/debug_docs.py
